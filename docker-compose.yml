version: "3.8"

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polanet-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - AUTO_BACKUP=true
      - AUTO_BACKUP_INTERVAL=3600000
      - AUTO_BACKUP_MAX_COUNT=24
      - SMS_API_KEY=${SMS_API_KEY}
      - CORS_ORIGIN=https://admin-polanet.ru
      - DATABASE_PATH=/app/data/polanet.db
    volumes:
      - backend-data:/app/data
    networks:
      - polanet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: polanet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - polanet-network

volumes:
  backend-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  polanet-network:
    driver: bridge
