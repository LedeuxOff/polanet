services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polanet-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - AUTO_BACKUP=true
      - AUTO_BACKUP_INTERVAL=3600000
      - AUTO_BACKUP_MAX_COUNT=24
      - CORS_ORIGIN=https://admin-polanet.ru
      - DATABASE_PATH=/app/data/polanet.db
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  backend-data:
    driver: local
