services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polanet-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - AUTO_BACKUP=true
      - AUTO_BACKUP_INTERVAL=3600000
      - AUTO_BACKUP_MAX_COUNT=24
      - CORS_ORIGIN=https://admin-polanet.ru
      - DATABASE_PATH=/app/data/polanet.db
      - TELEGRAM_BOT_TOKEN=8817861097:AAFdM38_0lZbyVTJnaJi6uHZ7QIZQPorPWY
      - TELEGRAM_WEBHOOK_URL=https://admin-polanet.ru/api/telegram/webhook
      - HTTP_PROXY=http://127.0.0.1:2017
      - HTTPS_PROXY=http://127.0.0.1:2017
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  backend-data:
    driver: local
